cameras:
  - id: laptop
    source: 0
    location: "Office desk"
    width: 640
    height: 480

  # Example RTSP camera (uncomment and set your URL):
  # - id: entrance
  #   source: "rtsp://<ip>:<port>/<path>"
  #   location: "Front entrance"
  #   width: 640
  #   height: 360

detector:
  model: yolo11n.pt
  confidence: 0.65
  classes:
    - person
    - dog
    - cat
    - bird

alerter:
  cooldown_seconds: 30
  desktop_notifications: true

display:
  show_window: true
  show_fps: true
  box_color: [0, 255, 0]
  box_thickness: 2

logging:
  level: INFO
  log_file: logs/detections.log

face_recognition:
  enabled: true
  db_path: "data/faces.db"
  faces_dir: "faces/"
  recognition_threshold: 0.5
  occlusion_det_threshold: 0.7
  occlusion_grace_frames: 5
  model_name: "buffalo_l"
  det_size: [640, 640]

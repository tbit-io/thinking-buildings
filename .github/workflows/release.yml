name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  # --- Resolve version ----------------------------------------------------
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      ref: ${{ steps.version.outputs.ref }}
    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "ref=${TAG}" >> $GITHUB_OUTPUT

  # --- Run tests first ---------------------------------------------------
  test:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest --tb=short

  # --- Build Windows installer --------------------------------------------
  build-windows:
    needs: [resolve, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build with PyInstaller (ONNX profile)
        shell: bash
        run: |
          PROFILE=onnx pyinstaller installer/thinking_buildings.spec

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" /DPRODUCT_VERSION=${{ needs.resolve.outputs.version }} installer\windows\thinking_buildings.nsi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/ThinkingBuildings-*-setup.exe

  # --- Build Linux tarball ------------------------------------------------
  build-linux:
    needs: [resolve, test]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build with PyInstaller (ONNX profile)
        run: |
          PROFILE=onnx pyinstaller installer/thinking_buildings.spec

      - name: Package as tarball
        run: |
          cd dist
          tar -czf thinking-buildings-${{ needs.resolve.outputs.version }}-linux-x86_64.tar.gz thinking-buildings-onnx/

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/thinking-buildings-*-linux-x86_64.tar.gz

  # --- Create GitHub Release ----------------------------------------------
  release:
    needs: [resolve, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.resolve.outputs.version }}"
          name: "Thinking Buildings v${{ needs.resolve.outputs.version }}"
          draft: false
          prerelease: ${{ contains(needs.resolve.outputs.version, '-rc') || contains(needs.resolve.outputs.version, '-beta') || contains(needs.resolve.outputs.version, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*
            artifacts/linux-build/*
